<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="7FyWxa6VegoZ0DWZyA1kIhoS7O2HILVTcG0lUrSB_Hs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Prediction System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .lang-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .lang-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; background: rgba(255,255,255,0.2); color: white; }
        .lang-btn.active { background: white; color: #667eea; }
        .form-card { 
            background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            text-align: center; 
        }
        input[type="text"] { 
            width: 70%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; 
            margin-right: 10px; 
        }
        button { 
            padding: 15px 30px; background: #667eea; color: white; border: none; border-radius: 10px; 
            font-size: 1.1rem; cursor: pointer; 
        }
        button:hover { background: #5a67d8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #results { margin-top: 30px; display: none; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #f8f9ff; padding: 25px; border-radius: 15px; }
        .card h3 { color: #667eea; margin-bottom: 20px; text-align: center; }
        .data-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .data-item:last-child { border-bottom: none; }
        .rain-badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; }
        .rain-yes { background: #d4edda; color: #155724; }
        .rain-no { background: #f8d7da; color: #721c24; }
        .error { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .loader { text-align: center; padding: 20px; display: none; }
        @media (max-width: 768px) { .weather-grid { grid-template-columns: 1fr; } input[type="text"] { width: 60%; margin-bottom: 10px; margin-right: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="title">🌤️ Weather Prediction App</h1>
            <p id="subtitle">Enter a city for live weather + ML predictions</p>
        </div>
        
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('en')">English</button>
            <button class="lang-btn" onclick="setLang('mr')">मराठी</button>
        </div>
        
        <div class="form-card">
            <h2 id="cityLabel">Enter City</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="city" placeholder="e.g. Mumbai, London, New York" onkeypress="if(event.key==='Enter') predict()">
                <button id="predictBtn" onclick="predict()">🔮 Predict Weather</button>
            </div>
            <div class="loader" id="loader">Loading... ⏳</div>
            <div class="error" id="error"></div>
            
            <div id="results">
                <div id="cityName" style="font-size: 1.5rem; text-align: center; margin-bottom: 20px; color: #333;"></div>
                <div class="weather-grid">
                    <div class="card">
                        <h3 id="currentTitle">📊 Current Weather</h3>
                        <div id="currentData"></div>
                    </div>
                    <div class="card">
                        <h3 id="predTitle">🧠 ML Predictions</h3>
                        <div id="predData"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            en: {
                title: '🌤️ Weather Prediction App',
                subtitle: 'Enter a city for live weather + ML predictions',
                cityLabel: 'Enter City Name',
                predictBtn: '🔮 Predict Weather',
                currentTitle: '📊 Current Weather',
                predTitle: '🧠 ML Predictions',
                temperature: 'Temperature',
                feelsLike: 'Feels Like',
                humidity: 'Humidity',
                pressure: 'Pressure',
                windSpeed: 'Wind Speed',
                predTemp: 'Predicted Temp (Next Hour)',
                rainPred: 'Rain Prediction',
                rainProb: 'Rain Probability',
                yes: 'Yes 🌧️',
                no: 'No ☀️',
                cityNotFound: 'City not found. Check spelling.',
                apiError: 'API error. Try again.'
            },
            mr: {
                title: '🌤️ हवामान अंदाज अॅप',
                subtitle: 'शहर टाकून थेट हवामान + ML अंदाज पहा',
                cityLabel: 'शहराचे नाव टाका',
                predictBtn: '🔮 हवामान अंदाज',
                currentTitle: '📊 सध्याचे हवामान',
                predTitle: '🧠 एमएल अंदाज',
                temperature: 'तापमान',
                feelsLike: 'जाणवते',
                humidity: 'आर्द्रता',
                pressure: 'दाब',
                windSpeed: 'वाऱ्याचा वेग',
                predTemp: 'अंदाजित तापमान (पुढील तास)',
                rainPred: 'पावसाचा अंदाज',
                rainProb: 'पाऊस संभाव्यता',
                yes: 'होय 🌧️',
                no: 'नाही ☀️',
                cityNotFound: 'शहर सापडले नाही. स्पेलिंग तपासा.',
                apiError: 'API त्रुटी. पुन्हा प्रयत्न करा.'
            }
        };
        let lang = 'en';

        function setLang(newLang) {
            lang = newLang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateTexts();
        }

        function updateTexts() {
            const t = TRANSLATIONS[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('cityLabel').textContent = t.cityLabel;
            document.getElementById('predictBtn').textContent = t.predictBtn;
            document.getElementById('currentTitle').textContent = t.currentTitle;
            document.getElementById('predTitle').textContent = t.predTitle;
        }

        async function predict() {
            const city = document.getElementById('city').value.trim();
            if (!city) return showError(TRANSLATIONS[lang].cityNotFound);

            const loader = document.getElementById('loader');
            const btn = document.getElementById('predictBtn');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            loader.style.display = 'block';
            btn.disabled = true;
            error.style.display = 'none';
            results.style.display = 'none';

            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Unknown error');

                displayResults(data);
            } catch (err) {
                showError(err.message.includes('City') ? TRANSLATIONS[lang].cityNotFound : TRANSLATIONS[lang].apiError);
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function displayResults(data) {
            const t = TRANSLATIONS[lang];
            const w = data.current_weather;
            const p = data.predictions;

            document.getElementById('cityName').textContent = `${w.city}, ${w.country}`;
            document.getElementById('results').style.display = 'block';

            document.getElementById('currentData').innerHTML = `
                <div class="data-item"><span>${t.temperature}</span><span>${w.temperature}°C</span></div>
                <div class="data-item"><span>${t.feelsLike}</span><span>${w.feels_like}°C</span></div>
                <div class="data-item"><span>${t.humidity}</span><span>${w.humidity}%</span></div>
                <div class="data-item"><span>${t.pressure}</span><span>${w.pressure} hPa</span></div>
                <div class="data-item"><span>${t.windSpeed}</span><span>${w.wind_speed} m/s</span></div>
            `;

            const rainClass = p.rain ? 'rain-yes' : 'rain-no';
            document.getElementById('predData').innerHTML = `
                <div class="data-item"><span>${t.predTemp}</span><span>${p.predicted_temperature.toFixed(1)}°C</span></div>
                <div class="data-item"><span>${t.rainPred}</span><span class="rain-badge ${rainClass}">${p.rain ? t.yes : t.no}</span></div>
                <div class="data-item"><span>${t.rainProb}</span><span>${(p.rain_probability * 100).toFixed(0)}%</span></div>
            `;
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        updateTexts();
    </script>
</body>
</html>
